# Sierra Corridor API — FastAPI service.
#   cd backend
#   pip install -e ".[dev]"
#   uvicorn api.main:app --port 5080 --no-server-header
#
# → Centralized configuration hub for managing the application's 
# dependencies, environment setups, development tools, and deployment settings

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "sierra-corridor-api"
version = "0.1.0"
description = "HTTP API for the Sierra Corridor frontend"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    # TestClient drives the app in-process over httpx — no socket, no server.
    "httpx>=0.28",
]

[tool.setuptools.packages.find]
include = ["api*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["api"]
