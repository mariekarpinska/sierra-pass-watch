name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      # The API imports the pipeline's regime classifier, so install the
      # monorepo root first for `sierra-corridor-pipeline` to resolve locally.
      - run: pip install -e ..
      - run: pip install -e ".[dev]"
      - run: pytest
      # Testcontainers spins up a real Postgres for the repository test.
      # - run: pytest -m integration 

  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration and not network"
      # Testcontainers spins up a real Postgres for the idempotency test.
      - run: pytest -m integration
      # Contract tests hit real upstream APIs — informational, never block CI.
      - run: pytest -m network
        continue-on-error: true

  warehouse:
    # Proves dbt builds the marts end to end: apply the bronze schema, load a
    # tiny fixture, then `dbt build` (seed + run + test) against real Postgres.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_dev_password
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # dbt profiles.yml and the psql calls read these; they match the
      # docker-compose defaults so local and CI behave identically.
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_password
      POSTGRES_DB: app
      PGPASSWORD: app_dev_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Pin the major so a future dbt-postgres release can't silently break CI.
      - run: pip install "dbt-postgres>=1.9,<2.0"
      # Bronze DDL first (the pipeline owns these tables), then the fixture.
      - run: psql -h localhost -U app -d app -f pipeline/db/schema.sql
      - run: psql -h localhost -U app -d app -f warehouse/ci/fixtures.sql
      - name: dbt build
        working-directory: warehouse
        run: dbt build --profiles-dir .
